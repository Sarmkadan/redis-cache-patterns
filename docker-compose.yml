version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: redis-cache-patterns-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      - REDIS_APPENDONLY=yes
    command: redis-server --appendonly yes
    networks:
      - cache-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redis-cache-patterns-app
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      REDIS_CONNECTION_STRING: "redis:6379"
      CACHE_DEFAULT_EXPIRATION_SECONDS: "3600"
      CACHE_ENABLE_COMPRESSION: "true"
      CACHE_COMPRESSION_THRESHOLD: "1024"
      CACHE_ENABLE_METRICS: "true"
      LOG_LEVEL: "Information"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cache-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  redis_data:
    driver: local

networks:
  cache-network:
    driver: bridge
